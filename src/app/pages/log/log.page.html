<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Today's Log</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="clearAll()" fill="clear" color="danger">Clear</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <p class="total">Total: {{ totalCalories }} kcal</p>

  <ion-list *ngIf="log.length > 0">
    <ion-item-sliding *ngFor="let item of log; let i = index">
      <ion-item>
        <ion-label>
          <h2>{{ item.name }}</h2>
          <p class="kcal-line">{{ item.calories }} kcal · {{ item.quantity }}g</p>
          <div class="macro-row">
            <span class="macro-tag protein">P {{ item.protein }}g</span>
            <span class="macro-tag carbs">C {{ item.carbs }}g</span>
            <span class="macro-tag fat">F {{ item.fat }}g</span>
          </div>
        </ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="remove(i)">Delete</ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <p *ngIf="log.length === 0" class="empty">No food logged yet.</p>
</ion-content>
